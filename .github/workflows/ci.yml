# =============================================
# Ye CI（持续集成）— 每次 push/PR 自动运行
# =============================================
#
# 流程：代码检查 → 后端测试 → 桌面端构建检查
# 任一步失败 → PR 无法合并

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -------- 后端 --------
  backend-lint:
    name: 后端代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/ --output-format=github

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: 跑测试
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # -------- 桌面端 --------
  desktop-build:
    name: 桌面端构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装前端依赖
        run: |
          cd desktop
          rm -f package-lock.json
          npm install

      - name: Vite 构建
        run: |
          cd desktop
          npm run build

  # -------- 汇总 --------
  ci-passed:
    name: CI 通过
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, desktop-build]
    if: always()
    steps:
      - run: |
          echo "backend-lint: ${{ needs.backend-lint.result }}"
          echo "backend-test: ${{ needs.backend-test.result }}"
          echo "desktop-build: ${{ needs.desktop-build.result }}"
          if [[ "${{ needs.backend-lint.result }}" != "success" || "${{ needs.backend-test.result }}" != "success" || "${{ needs.desktop-build.result }}" != "success" ]]; then
            echo "CI 失败！"
            exit 1
          fi
          echo "CI 全部通过！"
