# =============================================
# Ye CD（持续发布）— 打 tag 自动发布
# =============================================
#
# 使用方式：
#   git tag v0.1.0
#   git push origin v0.1.0
#
# 自动做的：
#   1. 跑后端测试（确保代码没问题）
#   2. 构建 Electron 桌面端
#   3. 创建 GitHub Release 并上传安装包

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && pip install -e ".[dev]"
      - run: cd backend && pytest tests/ -v

  build-desktop:
    name: 构建桌面端
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: 安装依赖
        run: cd desktop && npm ci

      - name: 构建 Electron
        run: cd desktop && npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: ye-desktop
          path: desktop/dist/*

  release:
    name: 创建 Release
    runs-on: ubuntu-latest
    needs: [test, build-desktop]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ye-desktop
          path: ./artifacts

      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Ye ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Ye ${{ steps.version.outputs.VERSION }}

            ### 安装
            下载下方的安装包，双击安装即可。

            ### 变更
            请查看自动生成的 compare 链接。
          files: ./artifacts/**
